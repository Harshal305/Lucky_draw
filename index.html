<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ram Mandir Lucky Draw</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: White;
    text-align: center;
    background-image: url("C:\Users\KUHU\Desktop\project\bg.jpg");
    background-size: cover;
    background-position: center;
}

.overlay {
    background: rgba(0,0,0,0.6);
    min-height: 100vh;
}

/* Scroll */
.scroll-container {
    height: 100vh;
    overflow: hidden;
}

.scroll-content {
    animation: scrollUp 12s linear infinite;
}

@keyframes scrollUp {
    0% { transform: translateY(100%); }
    100% { transform: translateY(-100%); }
}

h1 {
    background: orange;
    padding: 10px;
}

/* Form */
input {
    padding: 8px;
    margin: 5px;
}

button {
    padding: 8px;
    margin: 5px;
    border: none;
    cursor: pointer;
}

.add { background: green; color: white; }
.clear { background: red; color: white; }
.pdf { background: blue; color: white; }
.data { background: purple; color: white; }

/* Table */
table {
    width: 95%;
    margin: 20px auto;
    border-collapse: collapse;
    background: white;
    color: black;
}

th, td {
    border: 1px solid #ddd;
    padding: 10px;
}

img {
    width: 80px;
    height: 60px;
}
</style>
</head>

<body>

<div class="overlay">

<h1>🚩 श्री राम मंदिर लकी ड्रॉ बोरगांव खुर्द 🚩</h1>

<div>
    <input type="text" id="prize" placeholder="Prize">
    <input type="text" id="name" placeholder="Name">
    <input type="number" id="coupon" placeholder="Coupon">
    <input type="text" id="image" placeholder="Image No">

    <br>

    <button class="add" onclick="addWinner()">Add</button>
    <button class="clear" onclick="clearData()">Clear</button>
    <button class="pdf" onclick="downloadPDF()">Download PDF</button>
    <button class="data" onclick="downloadData()">Download Data</button>
</div>

<div class="scroll-container">
<div class="scroll-content" id="pdfContent">

<table>
<thead>
<tr>
<th>No</th>
<th>Prize</th>
<th>Image</th>
<th>Name</th>
<th>Coupon</th>
</tr>
</thead>

<tbody id="resultTable"></tbody>

</table>

</div>
</div>

</div>

<script>

let winners = JSON.parse(localStorage.getItem("winners")) || [];
let count = winners.length;

// Load data
window.onload = function() {
    winners.forEach((item, index) => {
        addRow(item.prize, item.name, item.coupon, item.image, index+1);
    });
};

function addWinner(){

    let prize = document.getElementById("prize").value;
    let name = document.getElementById("name").value;
    let coupon = document.getElementById("coupon").value;
    let image = document.getElementById("image").value;

    if(prize=="" || name=="" || coupon=="" || image==""){
        alert("Fill all fields");
        return;
    }

    // Duplicate check
    if(winners.some(w => w.coupon == coupon)){
        alert("Coupon already used!");
        return;
    }

    count++;

    winners.push({prize,name,coupon,image});
    localStorage.setItem("winners", JSON.stringify(winners));

    addRow(prize,name,coupon,image,count);

    // clear
    document.getElementById("prize").value="";
    document.getElementById("name").value="";
    document.getElementById("coupon").value="";
    document.getElementById("image").value="";
}

function addRow(prize,name,coupon,image,index){

    let imgPath = image + ".jpg";

    let row = `
    <tr>
    <td>${index}</td>
    <td>${prize}</td>
    <td><img src="${imgPath}"></td>
    <td>${name}</td>
    <td>${coupon}</td>
    </tr>`;

    document.getElementById("resultTable").innerHTML += row;
}

function clearData(){
    if(confirm("Delete all data?")){
        localStorage.removeItem("winners");
        location.reload();
    }
}

// PDF Download
function downloadPDF(){
    let element = document.getElementById("pdfContent");
    html2pdf().from(element).save("Lucky_Draw_Result.pdf");
}

// Data Download
function downloadData(){
    let dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(winners));
    let a = document.createElement("a");
    a.href = dataStr;
    a.download = "lucky_draw_data.json";
    a.click();
}

</script>

</body>
</html>
